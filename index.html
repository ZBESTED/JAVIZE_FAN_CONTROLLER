<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JavizeFAN Smart Controller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg-base: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-main: #1e293b;
            --text-sub: #64748b;
            --btn-bg: rgba(255, 255, 255, 0.8);
            --btn-text: #475569;
            --fan-stand: #475569;
            --fan-blade: #94a3b8;
            --fan-center: #1e293b;
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        [data-theme="dark"] {
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.4);
            --bg-base: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --btn-bg: rgba(51, 65, 85, 0.6);
            --btn-text: #e2e8f0;
            --fan-stand: #cbd5e0;
            --fan-blade: #64748b;
            --fan-center: #f8fafc;
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            transition: all 0.5s ease;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Animated Background Blobs for Premium Feel */
        .bg-blob {
            position: fixed; filter: blur(70px); opacity: 0.6; z-index: -1; border-radius: 50%;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 { background: #6366f1; width: 300px; height: 300px; top: -50px; left: -100px; }
        .blob-2 { background: #ec4899; width: 250px; height: 250px; bottom: 10%; right: -50px; animation-delay: -5s; }
        .blob-3 { background: #10b981; width: 200px; height: 200px; top: 40%; left: 20%; opacity: 0.3; animation-duration: 15s; }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(30px) scale(1.1); } }
        [data-theme="light"] .bg-blob { opacity: 0.3; }

        .app-container {
            width: 100%; max-width: 420px; background: var(--card-bg);
            border: 1px solid var(--card-border); border-radius: 40px;
            box-shadow: var(--glass-shadow); padding: 35px 25px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            position: relative; z-index: 1;
        }

        .theme-toggle {
            position: absolute; top: 30px; right: 25px;
            background: var(--btn-bg); border: 1px solid var(--card-border);
            color: var(--text-main); width: 45px; height: 45px;
            border-radius: 50%; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .theme-toggle:active { transform: scale(0.9); }

        .header { margin-bottom: 25px; }
        .header h1 { font-size: 28px; margin: 0; color: var(--primary); font-weight: 800; letter-spacing: -0.5px; }
        .header p { font-size: 14px; color: var(--text-sub); margin: 5px 0 0 0; font-weight: 500; }

        /* แผงควบคุมหลัก */
        .main-dashboard {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; background: rgba(0, 0, 0, 0.03);
            border-radius: 30px; padding: 25px; border: 1px solid var(--card-border);
        }
        [data-theme="dark"] .main-dashboard { background: rgba(0, 0, 0, 0.2); }

        .fan-wrapper { flex: 1; display: flex; justify-content: center; position: relative; }
        .fan-glow {
            position: absolute; width: 110px; height: 110px; background: transparent;
            border-radius: 50%; top: 15px; filter: blur(30px); transition: 0.5s; z-index: 0;
        }
        .stand-fan { height: 170px; z-index: 1; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.15)); }
        .blades { transform-origin: 50px 50px; transition: fill 0.4s; }
        .spin-1 { animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .spin-1 .blade-part { fill: var(--success); } 
        .spin-2 { animation: spin 0.6s linear infinite; }
        .spin-2 .blade-part { fill: var(--warning); } 
        .spin-3 { animation: spin 0.15s linear infinite; }
        .spin-3 .blade-part { fill: var(--danger); } 
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .controls-vertical { display: flex; flex-direction: column; gap: 10px; width: 75px; }
        .btn-speed {
            height: 44px; border: 1px solid var(--card-border); border-radius: 14px;
            font-size: 16px; font-weight: 700; cursor: pointer; background: var(--btn-bg);
            color: var(--text-main); transition: 0.3s; backdrop-filter: blur(10px);
        }
        .btn-speed:active { transform: scale(0.95); }
        .btn-speed.active { color: white; border-color: transparent; }
        #btn-3.active { background: var(--danger); box-shadow: 0 8px 20px rgba(239,68,68,0.4); }
        #btn-2.active { background: var(--warning); box-shadow: 0 8px 20px rgba(245,158,11,0.4); }
        #btn-1.active { background: var(--success); box-shadow: 0 8px 20px rgba(16,185,129,0.4); }
        #btn-natural { font-size: 15px; color: #06b6d4; }
        #btn-natural.active { background: #06b6d4; box-shadow: 0 8px 20px rgba(6,182,212,0.4); color: white; }
        .btn-off.active { background: var(--danger); color: white; }

        /* แถบสถานะแบบใหม่ */
        .status-card {
            background: var(--btn-bg); border-radius: 20px; padding: 15px;
            border: 1px solid var(--card-border); margin-bottom: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .status-header { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; }
        .led-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--text-sub); transition: 0.4s; }
        .time-info {
            display: flex; gap: 15px; font-size: 12px; color: var(--text-sub); font-weight: 500;
            background: rgba(0,0,0,0.03); padding: 8px 15px; border-radius: 10px; display: none;
        }
        [data-theme="dark"] .time-info { background: rgba(0,0,0,0.2); }
        .time-info div { display: flex; align-items: center; gap: 5px; }
        .sync-status { font-size: 11px; color: var(--primary); font-style: italic; display: none; }

        /* ระบบตั้งเวลา */
        .timer-module {
            background: var(--btn-bg); border-radius: 25px; border: 1px solid var(--card-border);
            overflow: hidden; display: flex; flex-direction: column;
        }
        .timer-tabs { display: flex; border-bottom: 1px solid var(--card-border); background: rgba(0,0,0,0.02); }
        .timer-tabs button {
            flex: 1; padding: 15px; background: transparent; border: none; color: var(--text-sub);
            font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 14px;
        }
        .timer-tabs button.active { background: var(--card-bg); color: var(--text-main); }
        .timer-tabs button#tab-off.active { border-bottom: 3px solid var(--danger); }
        .timer-tabs button#tab-on.active { border-bottom: 3px solid var(--success); }

        .timer-body { padding: 20px; }
        
        .mode-toggles { display: flex; background: var(--card-bg); border-radius: 12px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--card-border); }
        .mode-toggles label { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s; color: var(--text-sub); }
        .mode-toggles input { display: none; }
        .mode-toggles label.active { background: var(--btn-bg); color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* เลือกความแรงพัดลมตอนเปิด */
        .on-speed-config { margin-bottom: 15px; display: none; }
        .on-speed-config p { margin: 0 0 8px 0; font-size: 12px; font-weight: 600; color: var(--text-sub); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .segmented-control { display: flex; background: var(--card-bg); border-radius: 12px; padding: 4px; border: 1px solid var(--card-border); }
        .segmented-control label { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 14px; color: var(--text-sub); transition: 0.3s; }
        .segmented-control input { display: none; }
        .segmented-control input:checked + label[for="sp1"] { background: var(--success); color: white; box-shadow: 0 4px 10px rgba(16,185,129,0.3); }
        .segmented-control input:checked + label[for="sp2"] { background: var(--warning); color: white; box-shadow: 0 4px 10px rgba(245,158,11,0.3); }
        .segmented-control input:checked + label[for="sp3"] { background: var(--danger); color: white; box-shadow: 0 4px 10px rgba(239,68,68,0.3); }

        /* Time Inputs */
        .compact-time-picker { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .input-group { display: flex; align-items: center; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--card-border); padding: 5px 10px; }
        .input-group input { width: 35px; background: transparent; border: none; text-align: center; font-size: 18px; font-weight: 700; color: var(--text-main); outline: none; -moz-appearance: textfield; }
        .input-group input::-webkit-outer-spin-button, .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .input-group span { font-size: 13px; color: var(--text-sub); font-weight: 500; }

        .exact-time-picker { text-align: center; margin-bottom: 15px; display: none; }
        .exact-time-picker input { padding: 12px 20px; border-radius: 14px; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main); font-size: 20px; font-weight: 700; outline: none; font-family: 'Inter', sans-serif; }

        .btn-set-timer { width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: 700; font-size: 15px; color: white; cursor: pointer; transition: 0.3s; }
        .btn-set-off { background: var(--danger); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-set-on { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); display: none; }
        .btn-set-timer:active { transform: scale(0.95); }

        /* Active Timers Badge */
        .active-timers { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .timer-badge { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-radius: 14px; font-size: 13px; font-weight: 600; display: none; backdrop-filter: blur(10px); }
        .timer-badge.off { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .timer-badge.on { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-cancel-mini { background: var(--card-bg); border: 1px solid var(--card-border); color: inherit; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .btn-cancel-mini:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>
<div class="bg-blob blob-3"></div>

<div class="app-container">
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>

    <div class="header">
        <h1>JavizeFAN</h1>
        <p>Smart Home Controller V2</p>
    </div>

    <div class="main-dashboard">
        <div class="fan-wrapper">
            <div class="fan-glow" id="fan-glow"></div>
            <svg viewBox="0 0 100 160" class="stand-fan">
                <path d="M 30 150 Q 50 140 70 150 L 80 160 L 20 160 Z" fill="var(--fan-stand)"/>
                <rect x="46" y="90" width="8" height="60" fill="var(--fan-stand)" rx="2"/>
                <rect x="45" y="85" width="10" height="15" fill="var(--fan-stand)" rx="2"/>
                <circle cx="50" cy="50" r="16" fill="var(--fan-stand)"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke="var(--fan-stand)" stroke-width="1.5" opacity="0.6"/>
                <g class="blades" id="fan-blades">
                    <ellipse cx="50" cy="22" rx="10" ry="24" class="blade-part" fill="var(--fan-blade)" />
                    <ellipse cx="50" cy="78" rx="10" ry="24" class="blade-part" fill="var(--fan-blade)" />
                    <ellipse cx="22" cy="50" rx="24" ry="10" class="blade-part" fill="var(--fan-blade)" />
                    <ellipse cx="78" cy="50" rx="24" ry="10" class="blade-part" fill="var(--fan-blade)" />
                    <circle cx="50" cy="50" r="7" fill="var(--fan-center)"/>
                </g>
                <circle cx="50" cy="50" r="44" fill="none" stroke="var(--fan-stand)" stroke-width="2"/>
            </svg>
        </div>

        <div class="controls-vertical">
            <button class="btn-speed" id="btn-natural" onclick="toggleNaturalWind()"><i class="fa-solid fa-leaf"></i></button>
            <button class="btn-speed" id="btn-3" onclick="setFan('V5', 3)">3</button>
            <button class="btn-speed" id="btn-2" onclick="setFan('V3', 2)">2</button>
            <button class="btn-speed" id="btn-1" onclick="setFan('V2', 1)">1</button>
            <button class="btn-speed btn-off active" id="btn-0" onclick="setFan('V1', 0)"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <div class="status-card">
        <div class="status-header">
            <div class="led-dot" id="led-indicator"></div>
            <span id="status-label">Loading...</span>
        </div>
        <div class="time-info" id="time-info-container">
            <div><i class="fa-solid fa-play"></i> <span id="started-at-label">--:--</span></div>
            <div><i class="fa-solid fa-stopwatch"></i> <span id="uptime-label">00:00:00</span></div>
        </div>
        <div class="sync-status" id="sync-status">Syncing with hardware...</div>
    </div>

    <div class="timer-module">
        <div class="timer-tabs">
            <button id="tab-off" class="active" onclick="switchTab('off')">Auto-OFF</button>
            <button id="tab-on" onclick="switchTab('on')">Auto-ON</button>
        </div>
        
        <div class="timer-body">
            <div class="on-speed-config" id="speed-config-panel">
                <p>Target Fan Speed</p>
                <div class="segmented-control">
                    <input type="radio" id="sp1" name="on_speed" value="1" checked><label for="sp1">Speed 1</label>
                    <input type="radio" id="sp2" name="on_speed" value="2"><label for="sp2">Speed 2</label>
                    <input type="radio" id="sp3" name="on_speed" value="3"><label for="sp3">Speed 3</label>
                </div>
            </div>

            <div class="mode-toggles">
                <label class="active" id="lbl-cd" onclick="switchMode('cd')">
                    <input type="radio" name="t-mode" value="cd" checked> Countdown
                </label>
                <label id="lbl-time" onclick="switchMode('time')">
                    <input type="radio" name="t-mode" value="time"> Exact Time
                </label>
            </div>

            <div class="compact-time-picker" id="ui-cd">
                <div class="input-group"><input type="number" id="cd-h" value="0" min="0"><span>h</span></div>
                <div class="input-group"><input type="number" id="cd-m" value="30" min="0" max="59"><span>m</span></div>
                <div class="input-group"><input type="number" id="cd-s" value="0" min="0" max="59"><span>s</span></div>
            </div>

            <div class="exact-time-picker" id="ui-time">
                <input type="time" id="exact-time">
            </div>

            <button class="btn-set-timer btn-set-off" id="btn-submit-off" onclick="startTimer('off')">Set Auto-OFF</button>
            <button class="btn-set-timer btn-set-on" id="btn-submit-on" onclick="startTimer('on')">Set Auto-ON</button>
        </div>
    </div>

    <div class="active-timers">
        <div class="timer-badge off" id="badge-off">
            <span><i class="fa-regular fa-clock"></i> Turning OFF in: <b id="text-off"></b></span>
            <button class="btn-cancel-mini" onclick="cancelTimer('off')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="timer-badge on" id="badge-on">
            <span><i class="fa-regular fa-clock"></i> Turning ON (Spd <span id="on-target-spd"></span>) in: <b id="text-on"></b></span>
            <button class="btn-cancel-mini" onclick="cancelTimer('on')"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

</div>

<script>
    const BLYNK_AUTH_TOKEN = "XBzHPWNzCK_7bRzeVCQcleCkrb8we3TS"; 
    const BLYNK_SERVER = "blynk.cloud"; 

    // Theme Management
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    if(localStorage.getItem('theme') === 'light') {
        htmlEl.setAttribute('data-theme', 'light'); themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
    }
    function toggleTheme() {
        if(navigator.vibrate) navigator.vibrate(30);
        if(htmlEl.getAttribute('data-theme') === 'light') {
            htmlEl.setAttribute('data-theme', 'dark'); themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>'; localStorage.setItem('theme', 'dark');
        } else {
            htmlEl.setAttribute('data-theme', 'light'); themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>'; localStorage.setItem('theme', 'light');
        }
    }

    // Load Data
    window.addEventListener('load', async () => {
        const syncLabel = document.getElementById('sync-status');
        syncLabel.style.display = "block";
        try {
            const [res5, res3, res2] = await Promise.all([
                fetch(`https://${BLYNK_SERVER}/external/api/get?token=${BLYNK_AUTH_TOKEN}&pin=V5`).then(r => r.text()),
                fetch(`https://${BLYNK_SERVER}/external/api/get?token=${BLYNK_AUTH_TOKEN}&pin=V3`).then(r => r.text()),
                fetch(`https://${BLYNK_SERVER}/external/api/get?token=${BLYNK_AUTH_TOKEN}&pin=V2`).then(r => r.text())
            ]);
            if (res5 === "1") setFan('V5', 3, true, true);
            else if (res3 === "1") setFan('V3', 2, true, true);
            else if (res2 === "1") setFan('V2', 1, true, true);
            else setFan('V1', 0, true, true);
            syncLabel.innerText = "Synced successfully."; setTimeout(() => { syncLabel.style.display = "none"; }, 2000);
        } catch (error) {
            syncLabel.innerText = "Sync failed."; syncLabel.style.color = "var(--danger)"; setFan('V1', 0, true, true);
        }
    });

    // Fan Core & Time Tracking
    let turnOnTime = null, uptimeInterval = null, naturalMode = false, naturalInterval = null;

    function updateUptime() {
        if (!turnOnTime) return;
        const diff = Math.floor((Date.now() - turnOnTime) / 1000);
        const h = Math.floor(diff / 3600).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('uptime-label').innerText = `${h > 0 ? h+'h ' : ''}${m}m ${s}s`;
    }

    function toggleNaturalWind() {
        if(navigator.vibrate) navigator.vibrate(50);
        if(naturalMode) {
            naturalMode = false; clearInterval(naturalInterval); document.getElementById('btn-natural').classList.remove('active'); setFan('V1', 0); 
        } else {
            naturalMode = true; document.getElementById('btn-natural').classList.add('active');
            if(!turnOnTime) initTurnOnVisuals();
            triggerRandomSpeed(); naturalInterval = setInterval(triggerRandomSpeed, 6000);
        }
    }

    function triggerRandomSpeed() {
        if(!naturalMode) return;
        const speeds = [ { pin: 'V2', speed: 1 }, { pin: 'V3', speed: 2 }, { pin: 'V5', speed: 3 } ];
        const rand = speeds[Math.floor(Math.random() * speeds.length)];
        setFan(rand.pin, rand.speed, true, false);
        document.getElementById('status-label').innerText = `Natural Wind 🍃 (Spd ${rand.speed})`;
        document.getElementById('led-indicator').style.background = "#06b6d4"; 
        document.getElementById('led-indicator').style.boxShadow = "0 0 12px #06b6d4";
        document.getElementById('fan-glow').style.background = "rgba(6, 182, 212, 0.3)";
    }

    function initTurnOnVisuals() {
        turnOnTime = Date.now(); 
        const startedTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('started-at-label').innerText = startedTime;
        document.getElementById('time-info-container').style.display = "flex";
        updateUptime(); uptimeInterval = setInterval(updateUptime, 1000);
    }

    function setFan(pin, speed, isAuto = false, syncOnly = false) {
        if(!isAuto && !syncOnly && navigator.vibrate) navigator.vibrate(50);
        if(!isAuto && !syncOnly && naturalMode) { naturalMode = false; clearInterval(naturalInterval); document.getElementById('btn-natural').classList.remove('active'); }

        const blades = document.getElementById('fan-blades'), led = document.getElementById('led-indicator');
        const glow = document.getElementById('fan-glow'), label = document.getElementById('status-label');

        blades.className.baseVal = 'blades'; 
        document.querySelectorAll('.btn-speed:not(#btn-natural)').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${speed}`).classList.add('active');

        if(speed > 0) {
            blades.classList.add(`spin-${speed}`);
            if(!isAuto || syncOnly) {
                if(!turnOnTime) initTurnOnVisuals();
                if(speed === 1) { led.style.background = "var(--success)"; led.style.boxShadow = "0 0 12px var(--success)"; glow.style.background = "rgba(16, 185, 129, 0.3)"; label.innerText = "Speed 1 (Low)"; }
                if(speed === 2) { led.style.background = "var(--warning)"; led.style.boxShadow = "0 0 12px var(--warning)"; glow.style.background = "rgba(245, 158, 11, 0.3)"; label.innerText = "Speed 2 (Med)"; }
                if(speed === 3) { led.style.background = "var(--danger)"; led.style.boxShadow = "0 0 12px var(--danger)"; glow.style.background = "rgba(239, 68, 68, 0.3)"; label.innerText = "Speed 3 (High)"; }
            }
        } else {
            led.style.background = "var(--text-sub)"; led.style.boxShadow = "none"; glow.style.background = "transparent"; label.innerText = "Power OFF";
            turnOnTime = null; clearInterval(uptimeInterval); document.getElementById('time-info-container').style.display = "none";
        }
        if(!syncOnly) fetch(`https://${BLYNK_SERVER}/external/api/update?token=${BLYNK_AUTH_TOKEN}&pin=${pin}&value=1`, { mode: 'no-cors' }).catch(e=>console.log(e));
    }

    // Timer Logic
    let currentTab = 'off', currentMode = 'cd';
    let timers = { on: { interval: null }, off: { interval: null } };

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-on').classList.toggle('active', tab === 'on');
        document.getElementById('tab-off').classList.toggle('active', tab === 'off');
        document.getElementById('btn-submit-on').style.display = tab === 'on' ? 'block' : 'none';
        document.getElementById('btn-submit-off').style.display = tab === 'off' ? 'block' : 'none';
        document.getElementById('speed-config-panel').style.display = tab === 'on' ? 'block' : 'none';
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('lbl-cd').classList.toggle('active', mode === 'cd');
        document.getElementById('lbl-time').classList.toggle('active', mode === 'time');
        document.getElementById('ui-cd').style.display = mode === 'cd' ? 'flex' : 'none';
        document.getElementById('ui-time').style.display = mode === 'time' ? 'block' : 'none';
    }

    function startTimer(type) {
        if(navigator.vibrate) navigator.vibrate(30);
        cancelTimer(type); 
        let targetMs = 0; const now = new Date();

        if (currentMode === 'cd') {
            const h = parseInt(document.getElementById('cd-h').value) || 0, m = parseInt(document.getElementById('cd-m').value) || 0, s = parseInt(document.getElementById('cd-s').value) || 0;
            targetMs = now.getTime() + (h * 3600000) + (m * 60000) + (s * 1000);
            if(targetMs <= now.getTime()) return alert("Please set a valid duration.");
        } else {
            const timeVal = document.getElementById('exact-time').value;
            if(!timeVal) return alert("Please select a time.");
            const [th, tm] = timeVal.split(':');
            let targetDate = new Date(now); targetDate.setHours(th, tm, 0, 0);
            if (targetDate <= now) targetDate.setDate(targetDate.getDate() + 1);
            targetMs = targetDate.getTime();
        }

        if(type === 'on') {
            const speed = document.querySelector('input[name="on_speed"]:checked').value;
            document.getElementById('on-target-spd').innerText = speed;
        }

        document.getElementById(`badge-${type}`).style.display = "flex";

        timers[type].interval = setInterval(() => {
            const distance = targetMs - new Date().getTime();
            if (distance <= 0) executeTimerAction(type);
            else {
                const hr = Math.floor(distance / 3600000), min = Math.floor((distance % 3600000) / 60000), sec = Math.floor((distance % 60000) / 1000);
                document.getElementById(`text-${type}`).innerText = `${hr > 0 ? hr+'h ' : ''}${min}m ${sec}s`;
            }
        }, 1000);
    }

    function executeTimerAction(type) {
        cancelTimer(type);
        if(type === 'on') {
            const speed = parseInt(document.querySelector('input[name="on_speed"]:checked').value);
            const pin = speed === 1 ? 'V2' : (speed === 2 ? 'V3' : 'V5');
            setFan(pin, speed);
        }
        if(type === 'off') setFan('V1', 0); 
    }

    function cancelTimer(type) { clearInterval(timers[type].interval); document.getElementById(`badge-${type}`).style.display = "none"; }
</script>

</body>
