<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JavizeFAN Smart Controller</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg-base: #f4f7f9;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --btn-bg: rgba(255, 255, 255, 0.9);
            --btn-text: #475569;
            --fan-stand: #475569;
            --fan-blade: #94a3b8;
            --fan-center: #1e293b;
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
        }
        [data-theme="dark"] {
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.4);
            --bg-base: #0b1120;
            --card-bg: rgba(30, 41, 59, 0.5);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --btn-bg: rgba(51, 65, 85, 0.7);
            --btn-text: #e2e8f0;
            --fan-stand: #cbd5e0;
            --fan-blade: #64748b;
            --fan-center: #f8fafc;
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-base); margin: 0; padding: 20px 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; color: var(--text-main); transition: background-color 0.5s ease; box-sizing: border-box; overflow-x: hidden; }
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 12s infinite alternate ease-in-out; }
        .blob-1 { background: var(--primary); width: 350px; height: 350px; top: -100px; left: -100px; }
        .blob-2 { background: #06b6d4; width: 250px; height: 250px; bottom: 50px; right: -50px; animation-delay: -4s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 50px) scale(1.1); } }
        .app-container { width: 100%; max-width: 400px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 35px; box-shadow: var(--glass-shadow); padding: 30px 25px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); position: relative; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .title-area h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--primary), #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-area p { font-size: 13px; color: var(--text-sub); margin: 4px 0 0 0; font-weight: 500; }
        .theme-toggle { background: var(--btn-bg); border: 1px solid var(--card-border); color: var(--text-main); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .theme-toggle:active { transform: scale(0.9); }
        .device-showcase { background: rgba(0,0,0,0.02); border-radius: 25px; padding: 20px; border: 1px solid var(--card-border); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        [data-theme="dark"] .device-showcase { background: rgba(0,0,0,0.2); }
        .fan-wrapper { flex: 1; display: flex; justify-content: center; position: relative; }
        .fan-glow { position: absolute; width: 120px; height: 120px; background: transparent; border-radius: 50%; top: 10px; filter: blur(35px); transition: 0.5s; z-index: 0; }
        .stand-fan { height: 180px; z-index: 1; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.15)); }
        
        /* แก้ไขส่วนของใบพัด ใช้ JS หมุนแทน CSS Animation เพื่อให้มีแรงเฉื่อย */
        .blades { transform-origin: 50px 50px; transition: fill 0.4s; }
        .spd-1 .blade-part { fill: var(--success); } 
        .spd-2 .blade-part { fill: var(--warning); } 
        .spd-3 .blade-part { fill: var(--danger); } 

        .controls-vertical { display: flex; flex-direction: column; gap: 8px; width: 70px; }
        .btn-speed { height: 42px; border: 1px solid var(--card-border); border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; background: var(--btn-bg); color: var(--text-main); transition: 0.2s; }
        .btn-speed:active { transform: scale(0.95); }
        .btn-speed.active { color: white; border-color: transparent; }
        #btn-3.active { background: var(--danger); box-shadow: 0 6px 15px rgba(244,63,94,0.4); }
        #btn-2.active { background: var(--warning); box-shadow: 0 6px 15px rgba(245,158,11,0.4); }
        #btn-1.active { background: var(--success); box-shadow: 0 6px 15px rgba(16,185,129,0.4); }
        #btn-natural { color: #06b6d4; font-size: 15px; }
        #btn-natural.active { background: #06b6d4; box-shadow: 0 6px 15px rgba(6,182,212,0.4); color: white; }
        .btn-off.active { background: var(--text-sub); color: white; box-shadow: none; }
        .info-panel { background: var(--btn-bg); border-radius: 20px; padding: 18px; margin-bottom: 25px; border: 1px solid var(--card-border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .status-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .status-badge { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; }
        .led-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-sub); transition: 0.4s; box-shadow: 0 0 0 3px rgba(100,116,139,0.1); }
        .sync-text { font-size: 11px; color: var(--primary); font-weight: 600; display: none; }
        .time-metrics { display: none; background: rgba(0,0,0,0.03); border-radius: 12px; padding: 12px; gap: 10px; flex-direction: column; }
        [data-theme="dark"] .time-metrics { background: rgba(0,0,0,0.2); }
        .metric-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; color: var(--text-sub); }
        .metric-item span { color: var(--text-main); font-variant-numeric: tabular-nums; }
        .timer-section { background: var(--btn-bg); border-radius: 25px; border: 1px solid var(--card-border); overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .timer-tabs { display: flex; border-bottom: 1px solid var(--card-border); }
        .timer-tabs button { flex: 1; padding: 15px; background: transparent; border: none; color: var(--text-sub); font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .timer-tabs button.active { background: var(--card-bg); color: var(--text-main); }
        .timer-tabs button#tab-off.active { border-bottom: 3px solid var(--danger); }
        .timer-tabs button#tab-on.active { border-bottom: 3px solid var(--success); }
        .timer-body { padding: 20px; }
        .on-speed-config { margin-bottom: 20px; display: none; }
        .on-speed-config label.title { display: block; font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .speed-selector { display: flex; gap: 8px; }
        .speed-selector label { flex: 1; text-align: center; padding: 10px 0; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--card-border); font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; color: var(--text-sub); }
        .speed-selector input { display: none; }
        .speed-selector input:checked + label[for="sp1"] { background: var(--success); color: white; border-color: var(--success); }
        .speed-selector input:checked + label[for="sp2"] { background: var(--warning); color: white; border-color: var(--warning); }
        .speed-selector input:checked + label[for="sp3"] { background: var(--danger); color: white; border-color: var(--danger); }
        .mode-toggles { display: flex; background: var(--card-bg); border-radius: 10px; padding: 4px; margin-bottom: 15px; border: 1px solid var(--card-border); }
        .mode-toggles label { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; transition: 0.3s; color: var(--text-sub); }
        .mode-toggles input { display: none; }
        .mode-toggles label.active { background: var(--btn-bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .compact-time-picker { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .input-group { display: flex; align-items: baseline; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--card-border); padding: 8px 12px; }
        .input-group input { width: 40px; background: transparent; border: none; text-align: center; font-size: 22px; font-weight: 800; color: var(--text-main); outline: none; -moz-appearance: textfield; }
        .input-group input::-webkit-outer-spin-button, .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .input-group span { font-size: 14px; color: var(--text-sub); font-weight: 600; margin-left: 2px; }
        .exact-time-picker { text-align: center; margin-bottom: 20px; display: none; }
        .exact-time-picker input { padding: 12px 20px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text-main); font-size: 22px; font-weight: 800; outline: none; font-family: 'Inter', sans-serif; width: 150px; text-align: center; }
        .btn-set-timer { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: 800; font-size: 15px; color: white; cursor: pointer; transition: 0.3s; }
        .btn-set-off { background: var(--danger); box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3); }
        .btn-set-on { background: var(--success); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); display: none; }
        .btn-set-timer:active { transform: scale(0.95); }
        .active-timers { display: flex; flex-direction: column; gap: 10px; }
        .timer-badge { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-radius: 16px; font-size: 13px; font-weight: 600; display: none; background: var(--btn-bg); border: 1px solid var(--card-border); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .timer-badge i.icon { font-size: 16px; margin-right: 8px; }
        .timer-badge.off i.icon, .timer-badge.off b { color: var(--danger); }
        .timer-badge.on i.icon, .timer-badge.on b { color: var(--success); }
        .btn-cancel-mini { background: rgba(0,0,0,0.05); border: none; color: var(--text-sub); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        [data-theme="dark"] .btn-cancel-mini { background: rgba(255,255,255,0.1); }
        .btn-cancel-mini:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="ambient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="app-container">
    <div class="header">
        <div class="title-area"><h1>JavizeFAN</h1><p>Smart Environment Control</p></div>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
    </div>

    <div class="device-showcase">
        <div class="fan-wrapper">
            <div class="fan-glow" id="fan-glow"></div>
            <svg viewBox="0 0 100 160" class="stand-fan">
                <path d="M 30 150 Q 50 140 70 150 L 80 160 L 20 160 Z" fill="var(--fan-stand)"/>
                <rect x="46" y="90" width="8" height="60" fill="var(--fan-stand)" rx="2"/>
                <rect x="45" y="85" width="10" height="15" fill="var(--fan-stand)" rx="2"/>
                <circle cx="50" cy="50" r="16" fill="var(--fan-stand)"/>
                <circle cx="50" cy="50" r="42" fill="none" stroke="var(--fan-stand)" stroke-width="1.5" opacity="0.6"/>
                <g class="blades" id="fan-blades">
                    <ellipse cx="50" cy="22" rx="10" ry="24" class="blade-part" fill="var(--fan-blade)" />
                    <ellipse cx="50" cy="78" rx="10" ry="24" class="blade-part" fill="var(--fan-blade)" />
                    <ellipse cx="22" cy="50" rx="24" ry="10" class="blade-part" fill="var(--fan-blade)" />
                    <ellipse cx="78" cy="50" rx="24" ry="10" class="blade-part" fill="var(--fan-blade)" />
                    <circle cx="50" cy="50" r="7" fill="var(--fan-center)"/>
                </g>
                <circle cx="50" cy="50" r="44" fill="none" stroke="var(--fan-stand)" stroke-width="2"/>
            </svg>
        </div>

        <div class="controls-vertical">
            <button class="btn-speed" id="btn-natural" onclick="toggleNaturalWind()"><i class="fa-solid fa-leaf"></i></button>
            <button class="btn-speed" id="btn-3" onclick="setFan('V5', 3)">3</button>
            <button class="btn-speed" id="btn-2" onclick="setFan('V3', 2)">2</button>
            <button class="btn-speed" id="btn-1" onclick="setFan('V2', 1)">1</button>
            <button class="btn-speed btn-off active" id="btn-0" onclick="setFan('V1', 0)"><i class="fa-solid fa-power-off"></i></button>
        </div>
    </div>

    <div class="info-panel">
        <div class="status-row">
            <div class="status-badge">
                <div class="led-dot" id="led-indicator"></div>
                <span id="status-label">Fetching data...</span>
            </div>
            <div class="sync-text" id="sync-status"><i class="fa-solid fa-rotate"></i> Syncing</div>
        </div>
        
        <div class="time-metrics" id="time-metrics">
            <div class="metric-item">
                <div><i class="fa-solid fa-play"></i> Started At</div>
                <span id="started-at-label">--:--</span>
            </div>
            <div class="metric-item">
                <div><i class="fa-solid fa-stopwatch"></i> Uptime</div>
                <span id="uptime-label">00:00:00</span>
            </div>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer-tabs">
            <button id="tab-off" class="active" onclick="switchTab('off')">Auto-OFF Timer</button>
            <button id="tab-on" onclick="switchTab('on')">Auto-ON Timer</button>
        </div>
        
        <div class="timer-body">
            <div class="on-speed-config" id="speed-config-panel">
                <label class="title">Fan Speed Upon Start</label>
                <div class="speed-selector">
                    <input type="radio" id="sp1" name="on_speed" value="1" checked><label for="sp1">1</label>
                    <input type="radio" id="sp2" name="on_speed" value="2"><label for="sp2">2</label>
                    <input type="radio" id="sp3" name="on_speed" value="3"><label for="sp3">3</label>
                </div>
            </div>

            <div class="mode-toggles">
                <label class="active" id="lbl-cd" onclick="switchMode('cd')"><input type="radio" name="t-mode" value="cd" checked> Countdown</label>
                <label id="lbl-time" onclick="switchMode('time')"><input type="radio" name="t-mode" value="time"> Exact Time</label>
            </div>

            <div class="compact-time-picker" id="ui-cd">
                <div class="input-group"><input type="number" id="cd-h" value="0" min="0"><span>h</span></div>
                <div class="input-group"><input type="number" id="cd-m" value="30" min="0" max="59"><span>m</span></div>
                <div class="input-group"><input type="number" id="cd-s" value="0" min="0" max="59"><span>s</span></div>
            </div>

            <div class="exact-time-picker" id="ui-time">
                <input type="time" id="exact-time">
            </div>

            <button class="btn-set-timer btn-set-off" id="btn-submit-off" onclick="startTimer('off')">Set OFF Timer</button>
            <button class="btn-set-timer btn-set-on" id="btn-submit-on" onclick="startTimer('on')">Set ON Timer</button>
        </div>
    </div>

    <div class="active-timers">
        <div class="timer-badge off" id="badge-off">
            <div><i class="fa-solid fa-power-off icon"></i> Auto-OFF in <b id="text-off">--</b></div>
            <button class="btn-cancel-mini" onclick="cancelTimer('off', false)"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="timer-badge on" id="badge-on">
            <div><i class="fa-solid fa-bolt icon"></i> Auto-ON (Spd <span id="on-target-spd">1</span>) in <b id="text-on">--</b></div>
            <button class="btn-cancel-mini" onclick="cancelTimer('on', false)"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>
</div>

<script>
    // ----------------------------------------------------
    // ตั้งค่า Firebase และ Blynk
    // ----------------------------------------------------
    const BLYNK_AUTH_TOKEN = "XBzHPWNzCK_7bRzeVCQcleCkrb8we3TS"; 
    const BLYNK_SERVER = "blynk.cloud"; 

    const firebaseConfig = {
      apiKey: "AIzaSyDK8eWy4fzbVjE_c8b5hRoG9OBi4H3rOQE",
      authDomain: "bannbestz.firebaseapp.com",
      databaseURL: "https://bannbestz-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bannbestz",
      storageBucket: "bannbestz.firebasestorage.app",
      messagingSenderId: "303767393770",
      appId: "1:303767393770:web:57a48c573c0e20739cce93",
      measurementId: "G-G3JX9YNX1P"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const fanStateRef = db.ref('javizefan/state');
    const fanTimerRef = db.ref('javizefan/timers');

    // Theme Logic
    const htmlEl = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    if(localStorage.getItem('theme') === 'light') {
        htmlEl.setAttribute('data-theme', 'light'); themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
    }
    function toggleTheme() {
        if(navigator.vibrate) navigator.vibrate(30);
        if(htmlEl.getAttribute('data-theme') === 'light') {
            htmlEl.setAttribute('data-theme', 'dark'); themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>'; localStorage.setItem('theme', 'dark');
        } else {
            htmlEl.setAttribute('data-theme', 'light'); themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>'; localStorage.setItem('theme', 'light');
        }
    }

   // Uptime Core
    let turnOnTime = null, uptimeInterval = null, naturalMode = false, naturalInterval = null;
    
    // เพิ่มตัวแปรสำหรับจำความเร็วล่าสุดของโหมดลมธรรมชาติ
    let currentNaturalSpeed = 0; 
    let currentNaturalPin = 'V1';

    // --- ระบบแรงเฉื่อยใบพัดลม (Inertia) ---
    let currentRotation = 0;
    let currentVelocity = 0;
    let targetVelocity = 0;

    function animateFanBlades() {
        currentVelocity += (targetVelocity - currentVelocity) * 0.015; 
        currentRotation += currentVelocity;
        
        const blades = document.getElementById('fan-blades');
        if (blades) {
            blades.style.transform = `rotate(${currentRotation}deg)`;
        }
        requestAnimationFrame(animateFanBlades);
    }
    requestAnimationFrame(animateFanBlades);
    // ------------------------------------

    function updateUptime() {
        if (!turnOnTime) return;
        const diff = Math.floor((Date.now() - turnOnTime) / 1000);
        const h = Math.floor(diff / 3600).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        document.getElementById('uptime-label').innerText = `${h > 0 ? h+':' : ''}${m}:${s}`;
    }

    function initTurnOnVisuals(timestamp = Date.now()) {
        if(!turnOnTime) {
            turnOnTime = timestamp; 
            const d = new Date(timestamp);
            const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + " น.";
            document.getElementById('started-at-label').innerText = timeStr;
            document.getElementById('time-metrics').style.display = "flex";
            updateUptime(); uptimeInterval = setInterval(updateUptime, 1000);
        }
    }

    function toggleNaturalWind(fromFirebase = false) {
        if(!fromFirebase && navigator.vibrate) navigator.vibrate(50);
        
        if(naturalMode) {
            // กรณีกดปุ่มลมธรรมชาติอีกครั้งเพื่อ "ปิด"
            naturalMode = false; 
            clearInterval(naturalInterval); 
            document.getElementById('btn-natural').classList.remove('active'); 
            
            // สั่งปิดพัดลม (เบอร์ 0) ทันที
            if(!fromFirebase) {
                setFan('V1', 0); 
            }
        } else {
            // กรณีกด "เปิด" โหมดลมธรรมชาติ
            naturalMode = true; 
            document.getElementById('btn-natural').classList.add('active');
            initTurnOnVisuals();
            triggerRandomSpeed(); 
            naturalInterval = setInterval(triggerRandomSpeed, 6000);
        }

        // อัปเดตสถานะขึ้น Firebase ว่าโหมดลมธรรมชาติเปิดหรือปิดอยู่
        if(!fromFirebase) {
            fanStateRef.update({ naturalMode: naturalMode });
        }
    }

    function triggerRandomSpeed() {
        if(!naturalMode) return;
        const speeds = [ { pin: 'V2', speed: 1 }, { pin: 'V3', speed: 2 }, { pin: 'V5', speed: 3 } ];
        const rand = speeds[Math.floor(Math.random() * speeds.length)];
        
        // จำค่าล่าสุดไว้ เผื่อผู้ใช้กดปิดโหมดจะได้ใช้ค่านี้
        currentNaturalSpeed = rand.speed;
        currentNaturalPin = rand.pin;
        
        // 1. จัดการ UI
        document.querySelectorAll('.btn-speed:not(#btn-natural)').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${rand.speed}`).classList.add('active');
        
        const blades = document.getElementById('fan-blades');
        blades.className.baseVal = 'blades'; 
        blades.classList.add(`spd-${rand.speed}`);
        
        if(rand.speed === 1) targetVelocity = 8;
        if(rand.speed === 2) targetVelocity = 16;
        if(rand.speed === 3) targetVelocity = 28;

        document.getElementById('status-label').innerText = `Natural Wind (Spd ${rand.speed})`;
        document.getElementById('led-indicator').style.background = "#06b6d4"; 
        document.getElementById('led-indicator').style.boxShadow = "0 0 0 4px rgba(6,182,212,0.2)";
        document.getElementById('fan-glow').style.background = "rgba(6, 182, 212, 0.4)";

        // 2. ส่งคำสั่งไป Blynk ทันที!
        fetch(`https://${BLYNK_SERVER}/external/api/update?token=${BLYNK_AUTH_TOKEN}&pin=${rand.pin}&value=1`, { mode: 'no-cors' }).catch(e=>console.log(e));
    }

    function setFan(pin, speed, isAuto = false, syncOnly = false, fromFirebase = false) {
        if(!isAuto && !syncOnly && navigator.vibrate) navigator.vibrate(50);
        
        if(!isAuto && !syncOnly && naturalMode) { 
            naturalMode = false; clearInterval(naturalInterval); 
            document.getElementById('btn-natural').classList.remove('active'); 
            if(!fromFirebase) fanStateRef.update({ naturalMode: false });
        }

        const blades = document.getElementById('fan-blades'), led = document.getElementById('led-indicator');
        const glow = document.getElementById('fan-glow'), label = document.getElementById('status-label');

        blades.className.baseVal = 'blades'; 
        document.querySelectorAll('.btn-speed:not(#btn-natural)').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${speed}`).classList.add('active');

        if(speed > 0) {
            blades.classList.add(`spd-${speed}`);
            
            if(speed === 1) targetVelocity = 8;
            if(speed === 2) targetVelocity = 16;
            if(speed === 3) targetVelocity = 28;

            if(!isAuto || syncOnly) {
                initTurnOnVisuals();
                if(speed === 1) { led.style.background = "var(--success)"; led.style.boxShadow = "0 0 0 4px rgba(16,185,129,0.2)"; glow.style.background = "rgba(16, 185, 129, 0.35)"; label.innerText = "Running: Speed 1"; }
                if(speed === 2) { led.style.background = "var(--warning)"; led.style.boxShadow = "0 0 0 4px rgba(245,158,11,0.2)"; glow.style.background = "rgba(245, 158, 11, 0.35)"; label.innerText = "Running: Speed 2"; }
                if(speed === 3) { led.style.background = "var(--danger)"; led.style.boxShadow = "0 0 0 4px rgba(244,63,94,0.2)"; glow.style.background = "rgba(244, 63, 94, 0.35)"; label.innerText = "Running: Speed 3"; }
            }
        } else {
            targetVelocity = 0; 
            led.style.background = "var(--text-sub)"; led.style.boxShadow = "0 0 0 4px rgba(100,116,139,0.1)"; glow.style.background = "transparent"; label.innerText = "System OFF";
            turnOnTime = null; clearInterval(uptimeInterval); document.getElementById('time-metrics').style.display = "none";
        }
        
        if(!syncOnly && !fromFirebase) {
            fetch(`https://${BLYNK_SERVER}/external/api/update?token=${BLYNK_AUTH_TOKEN}&pin=${pin}&value=1`, { mode: 'no-cors' }).catch(e=>console.log(e));
            
            fanStateRef.update({ 
                speed: speed, 
                pin: pin,
                timestamp: speed > 0 ? Date.now() : null
            });
        }
    }

    // ----------------------------------------------------
    // Firebase Realtime Listeners
    // ----------------------------------------------------
    window.addEventListener('load', () => {
        document.getElementById('sync-status').style.display = "block";
        
        fanStateRef.on('value', (snapshot) => {
            document.getElementById('sync-status').style.display = "none";
            const data = snapshot.val();
            if(data) {
                if(data.naturalMode !== naturalMode) {
                    toggleNaturalWind(true);
                }
                if(!data.naturalMode && data.speed !== undefined) {
                    if(data.timestamp) turnOnTime = data.timestamp;
                    setFan(data.pin, data.speed, false, true, true);
                }
            } else {
                setFan('V1', 0, false, true, true);
            }
        });

        fanTimerRef.on('value', (snapshot) => {
            const timersData = snapshot.val();
            ['on', 'off'].forEach(type => {
                if(timersData && timersData[type] && timersData[type].targetMs > Date.now()) {
                    startLocalTimerUI(type, timersData[type].targetMs, timersData[type].speed);
                } else {
                    cancelTimer(type, true);
                }
            });
        });
    });

    // ----------------------------------------------------
    // UI ควบคุมการตั้งเวลา
    // ----------------------------------------------------
    let currentMode = 'cd';
    let activeIntervals = { on: null, off: null };

    function switchTab(tab) {
        document.getElementById('tab-on').classList.toggle('active', tab === 'on');
        document.getElementById('tab-off').classList.toggle('active', tab === 'off');
        document.getElementById('btn-submit-on').style.display = tab === 'on' ? 'block' : 'none';
        document.getElementById('btn-submit-off').style.display = tab === 'off' ? 'block' : 'none';
        document.getElementById('speed-config-panel').style.display = tab === 'on' ? 'block' : 'none';
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('lbl-cd').classList.toggle('active', mode === 'cd');
        document.getElementById('lbl-time').classList.toggle('active', mode === 'time');
        document.getElementById('ui-cd').style.display = mode === 'cd' ? 'flex' : 'none';
        document.getElementById('ui-time').style.display = mode === 'time' ? 'block' : 'none';
    }

    function startTimer(type) {
        if(navigator.vibrate) navigator.vibrate(30);
        let targetMs = 0; const now = new Date();

        if (currentMode === 'cd') {
            const h = parseInt(document.getElementById('cd-h').value) || 0, m = parseInt(document.getElementById('cd-m').value) || 0, s = parseInt(document.getElementById('cd-s').value) || 0;
            targetMs = now.getTime() + (h * 3600000) + (m * 60000) + (s * 1000);
            if(targetMs <= now.getTime()) return alert("Please set a valid duration.");
        } else {
            const timeVal = document.getElementById('exact-time').value;
            if(!timeVal) return alert("Please select a time.");
            const [th, tm] = timeVal.split(':');
            let targetDate = new Date(now); targetDate.setHours(th, tm, 0, 0);
            if (targetDate <= now) targetDate.setDate(targetDate.getDate() + 1);
            targetMs = targetDate.getTime();
        }

        let speed = 0;
        if(type === 'on') { speed = document.querySelector('input[name="on_speed"]:checked').value; }

        fanTimerRef.child(type).set({
            targetMs: targetMs,
            speed: parseInt(speed)
        });
    }

    function startLocalTimerUI(type, targetMs, speed = null) {
        cancelTimer(type, true); 
        
        if(type === 'on' && speed) {
            document.getElementById('on-target-spd').innerText = speed;
        }

        document.getElementById(`badge-${type}`).style.display = "flex";

        activeIntervals[type] = setInterval(() => {
            const distance = targetMs - new Date().getTime();
            if (distance <= 0) {
                executeTimerAction(type, speed);
            } else {
                const hr = Math.floor(distance / 3600000), min = Math.floor((distance % 3600000) / 60000), sec = Math.floor((distance % 60000) / 1000);
                document.getElementById(`text-${type}`).innerText = `${hr > 0 ? hr+'h ' : ''}${min}m ${sec}s`;
            }
        }, 1000);
    }

    function executeTimerAction(type, speed) {
        cancelTimer(type, true);
        if(type === 'on') {
            const pin = speed === 1 ? 'V2' : (speed === 2 ? 'V3' : 'V5');
            setFan(pin, speed);
        }
        if(type === 'off') setFan('V1', 0); 
        
        fanTimerRef.child(type).remove();
    }

    function cancelTimer(type, isFromFirebase = false) { 
        clearInterval(activeIntervals[type]); 
        document.getElementById(`badge-${type}`).style.display = "none"; 
        
        if(!isFromFirebase) {
            fanTimerRef.child(type).remove();
        }
    }
</script>

</body>
